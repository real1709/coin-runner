<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP Endless Runner Demo</title>
    <link rel="stylesheet" href="./styles.css?v=1.1" />
  </head>
  <body>
    <div class="app-shell">
      <main id="scene-start" class="scene scene-active">
        <section class="start-screen" aria-label="시작 화면">
          <img
            class="start-cover-image"
            src="./assets/start_penguin_dash.png"
            alt="게임 시작 화면"
          />
          <button
            id="start-button"
            class="tap-to-play-btn"
            type="button"
            aria-label="Tap to Play"
          >
            <img
              class="tap-to-play-image"
              src="./assets/tap_to_play_button.png"
              alt="Tap to Play"
            />
          </button>
        </section>
      </main>

      <main id="scene-game" class="scene">
        <section class="hud">
          <div class="hud-chip hud-chip-distance">
            거리 <strong id="hud-stage">0</strong>m
          </div>
          <div class="hud-chip hud-chip-level">
            단계 <strong id="hud-time">1</strong>
          </div>
          <div class="hud-hidden" aria-hidden="true">캐릭터 <strong id="hud-character"></strong></div>
          <div class="hud-hidden" aria-hidden="true">미션 <strong id="hud-mission">점수 1200+</strong></div>
          <div class="hud-hidden" aria-hidden="true">스킬 <strong id="hud-skill">준비됨</strong></div>
          <div class="hud-hidden" aria-hidden="true">점수 <strong id="hud-score">0</strong></div>
          <div class="hud-hidden" aria-hidden="true">수집 <strong id="hud-token">0</strong></div>
        </section>
        <canvas id="game-canvas" width="390" height="640"></canvas>
        <section class="survival-ui" aria-label="생존 게이지">
          <div class="survival-track">
            <div id="survival-fill" class="survival-fill"></div>
          </div>
          <div class="survival-label">
            생존 게이지 <strong id="survival-value">100%</strong>
          </div>
        </section>
        <div id="stage-overlay" class="overlay hidden"></div>
        <div class="mobile-controls" aria-label="모바일 이동 컨트롤">
          <button id="move-left-btn" class="move-btn" type="button">◀ 좌</button>
          <button
            id="pause-toggle-btn"
            class="pause-toggle-btn"
            type="button"
            aria-label="Pause"
          >
            PAUSE
          </button>
          <button id="move-right-btn" class="move-btn" type="button">우 ▶</button>
        </div>
      </main>

      <main id="scene-result" class="scene">
        <section class="panel result-panel">
          <h2 id="result-title">GAME OVER</h2>
          <div class="result-stats">
            <p>최종 거리 <strong id="result-stage">0</strong>m</p>
            <p>최종 단계 <strong id="result-level">1</strong>단계</p>
          </div>
          <section class="ranking-board" aria-label="거리 순위">
            <h3>거리 순위</h3>
            <ol id="result-ranking" class="result-ranking"></ol>
          </section>
          <div class="actions">
            <button id="retry-button" class="primary">즉시 재도전</button>
            <button id="share-button" class="secondary">공유</button>
          </div>
          <p class="muted result-meta" id="share-hint">공유 버튼 A/B 테스트 중</p>
        </section>
      </main>
    </div>

    <script src="./src/main.bundle.js?v=1.1"></script>
  </body>
</html>
